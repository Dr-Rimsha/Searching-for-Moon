<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cinematic Chand Raat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* 3D Perspective */
            font-family: 'Poppins', sans-serif;
        }

        /* Animated Stars Background */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            z-index: -1;
            animation: move-stars 100s linear infinite;
        }

        @keyframes move-stars {
            from { background-position: 0 0; }
            to { background-position: 10000px 5000px; }
        }

        /* 3D Glass Bubble */
        #bubble {
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.2);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.5s;
            transform-style: preserve-3d;
            animation: float3D 4s ease-in-out infinite;
        }

        #bubble:hover {
            transform: rotateY(20deg) rotateX(10deg) scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        @keyframes float3D {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-30px) rotateX(10deg) rotateY(10deg); }
        }

        /* Hidden Cinematic Content */
        #content {
            display: none;
            text-align: center;
            transform-style: preserve-3d;
        }

        .moon-frame {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            transform: translateZ(50px);
            animation: zoomIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .moon-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid rgba(255, 215, 0, 0.7);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.6), inset 0 0 20px #000;
        }

        /* Glow Effect behind image */
        .moon-frame::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            z-index: -1;
            filter: blur(20px);
            animation: pulse 2s infinite;
        }

        .message {
            margin-top: 30px;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1s forwards 1s;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5) translateZ(-100px); }
            to { opacity: 1; transform: scale(1) translateZ(50px); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="bubble" onclick="revealMagic()">
        <span>Search for Moon</span>
    </div>

    <div id="content">
        <div class="moon-frame">
            <img src="dr-rimsha.jpg" alt="Moon" class="moon-pic">
        </div>
        <div class="message">
            🌙 I Found the Moon... <br>
            <span style="font-size: 1.5rem; color: #ffd700;">Chand Raat Mubarak!</span>
        </div>
    </div>

    <script>
        function revealMagic() {
            const bubble = document.getElementById('bubble');
            const content = document.getElementById('content');
            
            // Smooth exit animation
            bubble.style.transition = '1s';
            bubble.style.opacity = '0';
            bubble.style.transform = 'scale(2) translateZ(200px)';
            
            setTimeout(() => {
                bubble.style.display = 'none';
                content.style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
